services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: 8800-bot:latest
    container_name: 8800-bot
    restart: always
    volumes:
      - ./core:/app/core
      - ./handlers:/app/handlers
      - ./keyboards:/app/keyboards
      - ./services:/app/services
      - ./utils:/app/utils
      - ./main.py:/app/main.py
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - PYTHONUNBUFFERED=1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    image: nginx:alpine
    container_name: 8800-web
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

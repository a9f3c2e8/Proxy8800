services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: 8800-bot:latest
    container_name: 8800-telegram-bot
    restart: always
    ports:
      - "8800:8800"
    volumes:
      - ./core:/app/core
      - ./handlers:/app/handlers
      - ./keyboards:/app/keyboards
      - ./services:/app/services
      - ./utils:/app/utils
      - ./main.py:/app/main.py
      - ./proxy_mtproto.py:/app/proxy_mtproto.py
      - ./start_all.sh:/app/start_all.sh
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - PYTHONUNBUFFERED=1
      - PROXY_DOMAIN=${PROXY_DOMAIN:-8800.life}
      - PROXY_PORT=${PROXY_PORT:-8800}
      - MTPROTO_SECRET=${MTPROTO_SECRET:-dd2ae5891b2b9b9b811b212050843193aa}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app-network:
    driver: bridge

volumes:
  proxy-data:

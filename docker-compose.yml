services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: 8800-bot:latest
    container_name: 8800-bot
    restart: always
    ports:
      - "8888:8888"
    volumes:
      - ./core:/app/core
      - ./handlers:/app/handlers
      - ./keyboards:/app/keyboards
      - ./services:/app/services
      - ./utils:/app/utils
      - ./main.py:/app/main.py
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - PYTHONUNBUFFERED=1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    image: caddy:2-alpine
    container_name: 8800-web
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./web:/srv:ro
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - bot
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:

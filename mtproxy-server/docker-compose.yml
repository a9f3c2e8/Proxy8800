services:
  mtproxy:
    image: alexbers/mtprotoproxy
    container_name: 8800-mtproxy
    restart: always
    ports:
      - "8800:443"
    environment:
      - TLS_DOMAIN=www.google.com
    volumes:
      - ./config.py:/opt/mtprotoproxy/config.py:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  metrics:
    image: python:3.11-slim
    container_name: 8800-metrics
    restart: always
    ports:
      - "8801:8801"
    volumes:
      - ./metrics.py:/app/metrics.py:ro
      - /proc:/host/proc:ro
    command: python /app/metrics.py
    pid: host
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

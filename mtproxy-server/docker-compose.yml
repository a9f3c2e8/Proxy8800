services:
  mtproxy:
    image: alexbers/mtprotoproxy:latest
    container_name: 8800-mtproxy
    restart: always
    ports:
      - "8800:8888"
    environment:
      - SECRET=7a3f9e2c8b1d4f6e5a9c3b7f2e8d1a99
      - PORT=8888
      - STATS_PORT=8889
      - TAG=no-tag
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

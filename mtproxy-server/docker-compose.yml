services:
  socks5:
    image: serjs/go-socks5-proxy
    container_name: 8800-socks5
    restart: always
    ports:
      - "8800:1080"
    environment:
      - PROXY_USER=8800user
      - PROXY_PASSWORD=8800pass2024
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  metrics:
    image: python:3.11-slim
    container_name: 8800-metrics
    restart: always
    ports:
      - "8801:8801"
    volumes:
      - ./metrics.py:/app/metrics.py:ro
      - /proc:/host/proc:ro
    command: python /app/metrics.py
    pid: host
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

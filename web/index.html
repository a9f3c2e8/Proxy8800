<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8800.life</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  color: #fff;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 300;
  min-height: 100vh;
  padding: 40px 20px;
}
.c { max-width: 860px; margin: 0 auto; }
.logo { text-align: center; margin-bottom: 50px; }
.logo h1 { font-size: 28px; font-weight: 400; letter-spacing: 6px; color: #fff; }
.logo .sub { color: #333; font-size: 10px; letter-spacing: 4px; margin-top: 6px; text-transform: uppercase; }
.logo .status {
  margin-top: 16px; display: inline-flex; align-items: center; gap: 8px;
  font-size: 11px; color: #6cb4ee; letter-spacing: 1px;
}
.logo .status .d {
  width: 6px; height: 6px; background: #6cb4ee; border-radius: 50%;
  animation: p 2.5s infinite;
}
.logo .status.off .d { background: #f44; animation: none; }
.logo .status.off { color: #f44; }
@keyframes p { 0%,100%{opacity:1} 50%{opacity:.2} }

.metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: #111; border: 1px solid #111; margin-bottom: 40px; }
.m { background: #000; padding: 28px 20px; text-align: center; }
.m .v { font-size: 32px; font-weight: 500; color: #fff; letter-spacing: 2px; }
.m .l { font-size: 9px; color: #444; margin-top: 8px; letter-spacing: 2px; text-transform: uppercase; }

.section-title { font-size: 10px; color: #333; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 12px; }

.node { border: 1px solid #111; margin-bottom: 30px; }
.node-head { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #111; }
.node-name { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 400; letter-spacing: 1px; }
.node-name .d { width: 6px; height: 6px; background: #6cb4ee; border-radius: 50%; }
.node-tag { font-size: 9px; color: #555; letter-spacing: 2px; border: 1px solid #222; padding: 4px 10px; }

.node-info { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: #111; }
.node-info .i { background: #000; padding: 16px 20px; }
.node-info .i .l { font-size: 9px; color: #333; letter-spacing: 1px; margin-bottom: 4px; }
.node-info .i .v { font-size: 12px; color: #ccc; }

.bars { padding: 20px; }
.b { margin-bottom: 12px; }
.b:last-child { margin-bottom: 0; }
.b-top { display: flex; justify-content: space-between; margin-bottom: 5px; }
.b-top span { font-size: 10px; color: #333; }
.b-top .pct { color: #555; }
.b-bar { height: 3px; background: #111; border-radius: 2px; overflow: hidden; }
.b-fill { height: 100%; border-radius: 2px; transition: width 1.5s ease; }
.b-fill.lo { background: #6cb4ee; }
.b-fill.md { background: #fa0; }
.b-fill.hi { background: #f44; }

.foot { text-align: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid #0a0a0a; }
.foot .upd { font-size: 10px; color: #222; letter-spacing: 1px; }
.foot .copy { font-size: 9px; color: #1a1a1a; margin-top: 10px; letter-spacing: 2px; }

@media(max-width:600px){
  .metrics{grid-template-columns:repeat(2,1fr);}
  .node-info{grid-template-columns:1fr;}
  .m .v{font-size:24px;}
  body{padding:20px 12px;}
}
</style>
</head>
<body>
<div class="c">
  <div class="logo">
    <h1>8800.life</h1>
    <div class="sub">proxy network</div>
    <div class="status" id="st"><div class="d"></div><span>подключение...</span></div>
  </div>
  <div class="metrics" id="met"></div>
  <div class="section-title">серверы</div>
  <div id="nodes"></div>
  <div class="foot">
    <div class="upd" id="upd"></div>
    <div class="copy">8800.life © 2026</div>
  </div>
</div>
<script>
const API = 'http://8800.life:8801/api/metrics';

function cls(p){return p<40?'lo':p<75?'md':'hi'}
function bar(l,p){
  return `<div class="b"><div class="b-top"><span>${l}</span><span class="pct">${p}%</span></div><div class="b-bar"><div class="b-fill ${cls(p)}" style="width:${p}%"></div></div></div>`;
}

async function render(){
  try {
    const r = await fetch(API);
    const d = await r.json();

    const load = Math.round(d.connections / d.max_connections * 100);

    document.getElementById('st').className = 'status';
    document.getElementById('st').innerHTML = `<div class="d"></div><span>все системы работают</span>`;

    document.getElementById('met').innerHTML = `
      <div class="m"><div class="v">${d.connections}</div><div class="l">онлайн</div></div>
      <div class="m"><div class="v">${d.cpu}%</div><div class="l">cpu</div></div>
      <div class="m"><div class="v">${d.ram.percent}%</div><div class="l">ram</div></div>
      <div class="m"><div class="v">${d.ping_dc2}мс</div><div class="l">пинг dc2</div></div>
    `;

    document.getElementById('nodes').innerHTML = `
      <div class="node">
        <div class="node-head">
          <div class="node-name"><div class="d"></div>${d.node}</div>
          <div class="node-tag">${d.protocol}</div>
        </div>
        <div class="node-info">
          <div class="i"><div class="l">локация</div><div class="v">${d.location}</div></div>
          <div class="i"><div class="l">аптайм</div><div class="v">${d.uptime.days}д ${d.uptime.hours}ч</div></div>
          <div class="i"><div class="l">подключений</div><div class="v">${d.connections} / ${d.max_connections}</div></div>
        </div>
        <div class="bars">
          ${bar('cpu', d.cpu)}
          ${bar('ram', d.ram.percent)}
          ${bar('диск', d.disk.percent)}
          ${bar('нагрузка', load)}
        </div>
      </div>
    `;

    document.getElementById('upd').textContent =
      'обновлено ' + new Date().toLocaleString('ru-RU');

  } catch(e) {
    document.getElementById('st').className = 'status off';
    document.getElementById('st').innerHTML = `<div class="d"></div><span>нет связи с сервером</span>`;
  }
}

render();
setInterval(render, 15000);
</script>
</body>
</html>
